name: snapcity
description: SnapCity civic intelligence mobile MVP prototype.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.1
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^20.1.0
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  haptic_feedback: ^0.6.4+3
  http: ^1.2.1
  image_picker: ^1.2.2
  latlong2: ^0.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  record: ^6.2.0
  shared_preferences: ^2.5.5
  share_plus: ^12.0.2
  flutter_email_sender: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/App Icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
